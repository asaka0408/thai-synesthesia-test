<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
Thai Number Synesthesia Test 3D
</title>

<link rel="stylesheet"
      href="style.css">

</head>

<body>

<!-- ================================================= -->
<!-- Start Screen                                      -->
<!-- ================================================= -->

<div id="start-screen"
     class="screen active">

    <h1>
        文字と色の対応関係の調査
    </h1>

    <div class="form-group">

        <label>
            回答者ID
        </label>

        <input
            id="participant-id"
            type="text"
            placeholder="例：P001">

    </div>

    <div class="form-group">

        <label>
            何度目の実験ですか
        </label>

        <select id="session-number">

            <option value="1">
                1回目
            </option>

            <option value="2">
                2回目
            </option>

            <option value="3">
                3回目
            </option>

        </select>

    </div>

    <button id="start-button">

        回答開始

    </button>

</div>

<!-- ================================================= -->
<!-- Experiment                                         -->
<!-- ================================================= -->

<div id="experiment-screen"
     class="screen">

<div id="experiment-container">

<!-- ================= LEFT ================= -->

<div id="viewer-section">

    <div id="progress">

        Trial 1 / 60

    </div>

    <!-- Three.js Canvas -->

    <div id="viewer-container">

    </div>

</div>

<!-- ================= RIGHT ================= -->

<div id="control-section">

    <!-- Selected Color -->

    <div class="panel">

        <h3>

            選択中の色

        </h3>

        <div id="selected-color-preview">

        </div>

    </div>

    <!-- Reason -->

    <div class="panel">

        <h3>

            色を選んだ根拠

        </h3>

        <div id="reason-group">

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="order">

                順序

            </label>

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="sound">

                音

            </label>

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="shape">

                形

            </label>

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="meaning">

                意味

            </label>

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="memory">

                特定の思い出

            </label>

            <label>

                <input
                    type="radio"
                    name="color-reason"
                    value="other">

                その他

            </label>

        </div>

    </div>

</div>

</div>

<!-- ================= Bottom ================= -->

<div id="bottom-area">

    <div id="symbol-display">

        ๕

    </div>

    <div id="button-area">

        <button id="confirm-color-button">

            色を決定

        </button>

        <button id="no-color-button">

            色を感じない

        </button>

    </div>

</div>

</div>

<!-- ================================================= -->
<!-- End Screen                                        -->
<!-- ================================================= -->

<div id="end-screen"
     class="screen">

    <h2>

        調査完了

    </h2>

    <p>

        ご回答ありがとうございました。

    </p>

</div>

<!-- ================================================= -->
<!-- Three.js                                          -->
<!-- ================================================= -->

<script type="importmap">

{
  "imports": {

    "three":

    "https://cdn.jsdelivr.net/npm/three@0.179/build/three.module.js"

  }
}

</script>

<!-- ================================================= -->

<script type="module"
        src="js/firebase.js">
</script>

<script type="module"
        src="js/app.js">
</script>

</body>

</html>
